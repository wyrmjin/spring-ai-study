server:
  port: 8852

spring:
  ai:
    openai:
      api-key: ${ZHIPU_API_KEY}
      base-url: https://open.bigmodel.cn/api/paas/v4
      chat:
        completions-path: /chat/completions
        options:
          model: glm-4.7-flash
          temperature: 0.7
          max-tokens: 4096

logging:
  level:
    org.springframework.ai: DEBUG
