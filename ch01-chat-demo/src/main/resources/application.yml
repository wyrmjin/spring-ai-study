server:
  port: 8848
spring:
  ai:
    openai:
      api-key: ${ZHIPU_API_KEY}
      base-url: https://open.bigmodel.cn/api/paas/v4
      chat:
        completions-path: /chat/completions
        options:
          model: glm-4.7-flash
          temperature: 0.8
          max-tokens: 2048

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
