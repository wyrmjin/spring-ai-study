server:
  port: 8856

spring:
  ai:
    openai:
      api-key: ${API_KEY}
      base-url: ${BASE_URL}
      chat:
        completions-path: ${COMPLETIONS_PATH}
        options:
          model: ${MODEL_ID}
          temperature: 0.7
          max-tokens: 4096

logging:
  level:
    org.springframework.ai: DEBUG
