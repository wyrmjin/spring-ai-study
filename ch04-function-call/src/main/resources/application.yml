server:
  port: 8850
spring:
  ai:
    openai:
      api-key: ${ZHIPU_API_KEY}
      base-url: ${BASE_URL}
      chat:
        completions-path: ${COMPLETIONS_PATH}
        options:
          model: ${MODEL_ID}
          temperature: 0.8
          max-tokens: 8092

logging:
  level:
    org.springframework.ai: DEBUG
